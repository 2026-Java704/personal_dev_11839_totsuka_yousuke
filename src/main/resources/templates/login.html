<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>ログイン</title>
	<link rel="stylesheet" href="/css/style.css">
</head>

<body>
	<h1>
		ログイン
	</h1>

	<form action="/login" method="post">
		<span th:text="${message}" style="color: red"></span><br>
		<input type="text" name="name" size="30" placeholder="名前"><br>
		<input type="text" name="password" size="30" placeholder="パスワード"><br>
		<button>ログイン</button>
	</form>
	<a href="/users/new" method="get">新規登録</a>


</body>

</html>
