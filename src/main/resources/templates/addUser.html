<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>新規登録画面</title>
</head>

<body>
	<h1>
		新規登録画面
	</h1>

	<form action="/users/add" method="post">
		<table border="1">
			<tr>
				<th>お名前</th>
				<td><input type="text" name="name"> </td>
			</tr>
			<tr>
				<th>パスワード </th>
				<td><input type="text" name="password"></td>
			</tr>
		</table>
		<button>新規登録</button>
	</form>
	<p><a href="/login">ログイン画面へ戻る</a></p>
</body>

</html>
